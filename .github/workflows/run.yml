name: 每日纳指估值推送

on:
  schedule:
    - cron: '0 0 * * *'   # 每天UTC 0点（北京时间8点）
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 运行脚本
        run: python pe_fetch.py
